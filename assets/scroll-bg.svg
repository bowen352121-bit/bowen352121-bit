        <text y="252" font-size="30" fill="#a8a29e">KIDS HERO JUSTICE ZZZ EMPTY CALIBER SHINZO SASAGEYO&nbsp;&nbsp;KIDS HERO JUSTICE ZZZ EMPTY CALIBER SHINZO SASAGEYO&nbsp;&nbsp;</text>
