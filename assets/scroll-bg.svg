      </g>
    </g>

    <!-- 3: left -->
    <g>
      <g>
        <text y="148" font-size="40" fill="#71717a" letter-spacing="2">ZENLESS ZONE ZERO CHUANSHI RISHI MENG&nbsp;&nbsp;ZENLESS ZONE ZERO CHUANSHI RISHI MENG&nbsp;&nbsp;</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;-600 0;0 0" dur="32s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- 4: right -->
    <g transform="rotate(-3 600 196)">
