        <text y="196" font-size="26" fill="#94a3b8" letter-spacing="-0.5">HYPHAE BOWEN KNIGHT DREAM SURMON CODE INSIGHT NEVER GIVE UP&nbsp;&nbsp;HYPHAE BOWEN KNIGHT DREAM SURMON CODE INSIGHT NEVER GIVE UP&nbsp;&nbsp;</text>
        <animateTransform attributeName="transform" type="translate" values="-600 0;0 0;-600 0" dur="38s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- 5: left -->
